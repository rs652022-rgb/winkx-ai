version: '3.9'

services:
  # PostgreSQL with pgvector
  postgres:
    image: pgvector/pgvector:pg16
    container_name: winkx_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: winkx_db
      POSTGRES_USER: winkx_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-winkx_secure_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U winkx_user -d winkx_db']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: winkx_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-winkx_redis_pass}
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', '--no-auth-warning', '-a', '${REDIS_PASSWORD:-winkx_redis_pass}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # API (Node.js + Express)
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: winkx_api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://winkx_user:${POSTGRES_PASSWORD:-winkx_secure_pass}@postgres:5432/winkx_db
      REDIS_URL: redis://:${REDIS_PASSWORD:-winkx_redis_pass}@redis:6379
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Web (Next.js)
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: winkx_web
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api:4000}
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://api:4000}
    ports:
      - '3000:3000'
    depends_on:
      api:
        condition: service_healthy

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: winkx_nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
      - web

  # Prisma migrations runner (one-shot)
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: winkx_migrate
    env_file: .env
    environment:
      DATABASE_URL: postgresql://winkx_user:${POSTGRES_PASSWORD:-winkx_secure_pass}@postgres:5432/winkx_db
    command: npx prisma migrate deploy
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

volumes:
  postgres_data:
  redis_data:
  nginx_logs:

networks:
  default:
    name: winkx_network
